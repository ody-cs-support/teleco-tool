<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テレコ商品一覧ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', sans-serif;
    background: #F7F8FA; color: #1A1A2E; min-height: 100vh;
  }
  header {
    background: #1A1A2E; padding: 20px 32px;
    display: flex; align-items: center; gap: 12px;
  }
  header .logo {
    width: 32px; height: 32px; background: #FF6B35; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: white; font-weight: 700;
  }
  header h1 { font-size: 16px; font-weight: 600; color: #FFF; letter-spacing: 0.04em; }
  header span { font-size: 12px; color: #888; margin-left: 4px; }

  .main { max-width: 1280px; margin: 0 auto; padding: 40px 32px; }

  .steps {
    display: flex; margin-bottom: 36px;
    border: 1px solid #E0E0E8; border-radius: 12px; overflow: hidden; background: white;
  }
  .step { flex: 1; padding: 20px 18px; border-right: 1px solid #E0E0E8; }
  .step:last-child { border-right: none; }
  .step-num { font-size: 11px; font-weight: 700; color: #FF6B35; letter-spacing: 0.08em; margin-bottom: 6px; }
  .step-title { font-size: 13px; font-weight: 600; }
  .step-sub { font-size: 11px; color: #888; margin-top: 3px; line-height: 1.5; }

  .drop-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

  .drop-zone {
    border: 2px dashed #C8CADC; border-radius: 12px;
    padding: 28px 20px; text-align: center; cursor: pointer;
    transition: all 0.18s; background: white; position: relative;
    min-height: 140px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: #FF6B35; background: #FFF5F1; }
  .drop-zone.loaded { border-color: #34C98A; border-style: solid; background: #F0FBF6; }
  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: #ECEDF5; color: #888; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; flex-shrink: 0;
  }
  .drop-zone.loaded .drop-num { background: #34C98A; color: white; }
  .drop-icon-generic { font-size: 26px; }
  .drop-main-label { font-size: 13px; font-weight: 700; color: #1A1A2E; }
  .drop-company-name {
    font-size: 12px; font-weight: 600; color: #34C98A;
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    display: none;
  }
  .drop-zone.loaded .drop-company-name { display: block; }
  .drop-hint { font-size: 11px; color: #AAA; }
  .drop-zone.loaded .drop-hint { display: none; }
  .drop-filename {
    font-size: 10px; color: #AAA; font-weight: 400;
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    display: none;
  }
  .drop-zone.loaded .drop-filename { display: block; }

  

  .btn-generate {
    width: 100%; padding: 16px; background: #FF6B35; color: white;
    border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.04em; transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-generate:hover { background: #E85A24; }
  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled { background: #CCC; cursor: not-allowed; }

  .preview-section { margin-top: 36px; display: none; }
  .preview-section.visible { display: block; }
  .preview-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .preview-title { font-size: 14px; font-weight: 700; color: #1A1A2E; }
  .btn-download {
    padding: 9px 20px; background: #1A1A2E; color: white;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s;
  }
  .btn-download:hover { background: #333; }

  .legend { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
  .legend-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

  .summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }
  .summary-card {
    background: white; border: 1px solid #E0E0E8; border-radius: 10px;
    padding: 14px 16px; text-align: center;
  }
  .summary-card .num { font-size: 26px; font-weight: 700; }
  .summary-card .lbl { font-size: 11px; color: #888; margin-top: 2px; }
  .summary-card.red .num   { color: #C62828; }
  .summary-card.amber .num { color: #E65100; }
  .summary-card.blue .num  { color: #1565C0; }

  .table-wrap {
    background: white; border-radius: 12px; border: 1px solid #E0E0E8;
    overflow: hidden; margin-bottom: 24px;
  }
  .tables-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;
  }
  .tables-row .table-wrap { margin-bottom: 0; }
  .section-header { padding: 12px 16px; font-size: 13px; font-weight: 700; color: white; }
  .section-header.c1 { background: #E65100; }
  .section-header.c2 { background: #1A237E; }

  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  thead th {
    padding: 7px 8px; font-size: 10px; font-weight: 600; color: #555;
    text-align: left; border-bottom: 1px solid #E0E0E8; background: #FAFAFA; white-space: nowrap;
  }
  thead th.num { text-align: center; }
  tbody td { padding: 6px 8px; border-bottom: 1px solid #F0F0F5; vertical-align: middle; line-height: 1.4; }
  tbody td.num { text-align: center; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr.overlap { background: #FFEBEE; }
  tbody tr.overlap td { color: #7F0000; font-weight: 600; }
  tbody tr.normal-c1 { background: #FFFDE7; }
  tbody tr.normal-c2 { background: #E3F2FD; }
  tbody tr.bihin { background: #F3E5F5; }
  tbody tr.bihin td { color: #4A148C; font-style: italic; }
  .tag-overlap {
    display: inline-block; font-size: 10px; font-weight: 700;
    background: #FF8A80; color: #7F0000; padding: 1px 6px;
    border-radius: 4px; margin-left: 6px; vertical-align: middle;
  }
  .tag-seikyu {
    display: inline-block; font-size: 10px; font-weight: 700;
    background: #C8E6C9; color: #1B5E20; padding: 1px 6px;
    border-radius: 4px; margin-left: 6px; vertical-align: middle;
  }

  /* テレコ比較セクション */
  .compare-wrap {
    background: white; border-radius: 12px;
    border: 2px solid #FF8A80; overflow: hidden; margin-bottom: 24px;
  }
  .compare-header {
    background: #C62828; padding: 12px 16px;
    font-size: 13px; font-weight: 700; color: white;
    display: flex; align-items: center; gap: 8px;
  }
  .compare-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .compare-table thead th {
    padding: 9px 10px; font-size: 11px; font-weight: 600;
    color: #555; text-align: center; border-bottom: 1px solid #E0E0E8;
    background: #FFF5F5; white-space: nowrap;
  }
  .compare-table thead th.left { text-align: left; }
  .compare-table tbody td {
    padding: 8px 10px; border-bottom: 1px solid #FFEBEE;
    vertical-align: middle; text-align: center;
  }
  .compare-table tbody td.left { text-align: left; }
  .compare-table tbody tr:last-child td { border-bottom: none; }
  .compare-table tbody tr { background: #FFF8F8; }
  .qty-diff { font-weight: 700; }
  .qty-diff.more { color: #C62828; }
  .qty-same { color: #888; }
  .tag-diff {
    display: inline-block; font-size: 10px; font-weight: 700;
    background: #FFF3E0; color: #E65100; padding: 1px 6px;
    border-radius: 4px; margin-left: 4px; vertical-align: middle;
    border: 1px solid #FFCC80;
  }
  .billing-note {
    font-size: 11px; color: #555; font-weight: 500; margin-top: 2px; display: inline-block;
  }
</style>

<body>

<header>
  <div class="logo">T</div>
  <h1>テレコ商品一覧ツール</h1>
  <span>OFFICE DE YASAI</span>
  <a href="guide.html" target="_blank" style="margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.12);color:white;font-size:12px;font-weight:600;padding:7px 14px;border-radius:8px;text-decoration:none;letter-spacing:0.03em;transition:background 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.22)'" onmouseout="this.style.background='rgba(255,255,255,0.12)'">
    📋 CSVの書き出し方
  </a>
</header>

<div class="main">
  <div class="steps">
    <div class="step">
      <div class="step-num">STEP 1</div>
      <div class="step-title">CSVを読み込む</div>
      <div class="step-sub">2社分のCSVを<br>それぞれドロップ</div>
    </div>
    <div class="step">
      <div class="step-num">STEP 2</div>
      <div class="step-title">一覧を作成する</div>
      <div class="step-sub">ボタンをクリックして<br>プレビュー確認</div>
    </div>
    <div class="step">
      <div class="step-num">STEP 3</div>
      <div class="step-title">Excelをダウンロード</div>
      <div class="step-sub">ボタン1つで<br>色付きExcel出力</div>
    </div>
  </div>

  <div class="drop-row">
    <div class="drop-zone" id="zone1"
      ondragover="onDragOver(event,'zone1')"
      ondragleave="onDragLeave('zone1')"
      ondrop="onDrop(event,'zone1')">
      <input type="file" accept=".csv,.numbers" onchange="onFileChange(event,'zone1')">
      <div class="drop-num">1</div>
      <div class="drop-icon-generic">📄</div>
      <div class="drop-main-label">1社目のCSV</div>
      <div class="drop-company-name" id="cname1"></div>
      <div class="drop-hint">ドロップ またはクリックして選択</div>
      <div class="drop-filename" id="fname1"></div>
    </div>
    <div class="drop-zone" id="zone2"
      ondragover="onDragOver(event,'zone2')"
      ondragleave="onDragLeave('zone2')"
      ondrop="onDrop(event,'zone2')">
      <input type="file" accept=".csv,.numbers" onchange="onFileChange(event,'zone2')">
      <div class="drop-num">2</div>
      <div class="drop-icon-generic">📄</div>
      <div class="drop-main-label">2社目のCSV</div>
      <div class="drop-company-name" id="cname2"></div>
      <div class="drop-hint">ドロップ またはクリックして選択</div>
      <div class="drop-filename" id="fname2"></div>
    </div>
  </div>

  <button class="btn-generate" id="btnGen" onclick="generate()" disabled>
    🥗 一覧を作成する
  </button>

  <div class="preview-section" id="preview">
    <div class="preview-header">
      <div class="preview-title" id="previewTitle"></div>
      <button class="btn-download" onclick="downloadExcel()">📥 Excelをダウンロード</button>
    </div>
    <div class="summary" id="summary"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#FF8A80;"></div>テレコ被り（請求あり）</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFFDE7;border:1px solid #E0C800;"></div><span id="legend1">1社目のみ</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#E3F2FD;border:1px solid #90CAF9;"></div><span id="legend2">2社目のみ</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#F3E5F5;border:1px solid #CE93D8;"></div>備品</div>
    </div>
    <div id="tables"></div>
  </div>
</div>

<script>
// NaN対策: 数値変換ヘルパー
function safeInt(v) { const n = parseInt(v); return isNaN(n) ? '' : n; }

let rawData = { z1: null, z2: null };
let companyName = { z1: '', z2: '' };
let parsedData  = { c1: [], c2: [] };
let commonPmx   = new Set();
let deliveryDate = '';

// ── CSV から社名を抽出 ───────────────────────────────────
// ファイル名に含まれる会社名部分を取る（最初の「_」区切り or そのまま）
function extractCompanyName(filename, rows) {
  // CSVデータの中に会社名っぽいものがあればそこから
  // なければファイル名から生成
  const base = filename.replace(/\.csv$/i, '').replace(/_/g, ' ').replace(/日別販売量テ.ータ.*/,'').trim();
  return base || filename;
}

// ── ドロップゾーン ───────────────────────────────────────
function onDragOver(e, id) { e.preventDefault(); document.getElementById(id).classList.add('dragover'); }
function onDragLeave(id)   { document.getElementById(id).classList.remove('dragover'); }
function onDrop(e, id) { e.preventDefault(); onDragLeave(id); const f = e.dataTransfer.files[0]; if(f) loadFile(f,id); }
function onFileChange(e, id) { const f = e.target.files[0]; if(f) loadFile(f,id); }

function loadFile(file, id) {
  const isNumbers = file.name.toLowerCase().endsWith('.numbers');
  if (isNumbers) {
    loadNumbersFile(file, id);
  } else {
    loadCsvFile(file, id);
  }
}

async function loadNumbersFile(file, id) {
  const zone = document.getElementById(id);
  const ni = id === 'zone1' ? '1' : '2';
  document.getElementById('cname' + ni).textContent = '変換中...';
  zone.classList.add('loaded');

  try {
    // ArrayBufferをbase64に変換
    const buf = await file.arrayBuffer();
    const bytes = new Uint8Array(buf);
    let b64 = '';
    const chunkSize = 8192;
    for (let i = 0; i < bytes.length; i += chunkSize) {
      b64 += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
    }
    b64 = btoa(b64);

    // APIにPythonコード実行を依頼してCSVに変換
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 8000,
        messages: [{
          role: 'user',
          content: `以下はApple Numbersファイルをbase64エンコードしたデータです。
Pythonのnumbers-parserライブラリを使って読み込み、CSV形式に変換して出力してください。

手順：
1. base64をデコードしてバイナリファイルとして保存
2. numbers_parserで読み込む
3. 全行をCSV形式（カンマ区切り）で出力する
4. **CSVデータのみ出力**（説明文・コードブロック一切不要）

base64データ:
${b64}`
        }]
      })
    });

    if (!res.ok) throw new Error('API error: ' + res.status);
    const data = await res.json();
    const csvText = (data.content||[])
      .map(b => b.text||'').join('')
      .replace(/```[\s\S]*?\n/g,'').replace(/```/g,'').trim();

    if (!csvText || csvText.length < 10) throw new Error('変換結果が空です');

    processLoadedRows(csvText, file.name, id);

  } catch(err) {
    zone.classList.remove('loaded');
    document.getElementById('cname' + ni).textContent = '';
    alert('Numbersファイルの読み込みに失敗しました。\nNumbersで開き「ファイル→書き出す→CSV」でCSV保存してからお試しください。\n\nエラー: ' + err.message);
  }
}

function loadCsvFile(file, id) {
  const reader = new FileReader();
  reader.onload = e => {
    const buf = new Uint8Array(e.target.result);
    let text;
    if (buf[0]===0xEF && buf[1]===0xBB && buf[2]===0xBF) {
      // UTF-8 BOM付き
      text = new TextDecoder('utf-8').decode(buf);
    } else {
      const utf8 = new TextDecoder('utf-8').decode(buf);
      const sjis = new TextDecoder('shift-jis').decode(buf);
      const utf8Errors = (utf8.match(/\uFFFD/g)||[]).length;
      const sjisErrors = (sjis.match(/\uFFFD/g)||[]).length;
      // UTF-8エラーがSJISより少ないか同数ならUTF-8優先
      text = utf8Errors <= sjisErrors ? utf8 : sjis;
    }
    processLoadedRows(text, file.name, id);
  };
  reader.readAsArrayBuffer(file);
}

function processLoadedRows(text, filename, id) {
  const rows = parseCSV(text);
  const key  = id === 'zone1' ? 'z1' : 'z2';
  rawData[key] = rows;

  if (id === 'zone1' && rows.length > 0 && rows[0]['配達日']) {
    deliveryDate = rows[0]['配達日'].trim();
  }

  const cname = extractCompanyName(filename, rows);
  companyName[key] = cname;

  const ni = id === 'zone1' ? '1' : '2';
  document.getElementById('cname' + ni).textContent = cname;
  document.getElementById('fname' + ni).textContent = filename;
  document.getElementById(id).classList.add('loaded');
  checkReady();
}

// RFC4180準拠のCSVパーサー（引用符・カンマ含む値に対応）
function parseCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const parseRow = line => {
    const cols = [];
    let cur = '', inQ = false, i = 0;
    while (i < line.length) {
      const c = line[i];
      if (inQ) {
        if (c==='"' && line[i+1]==='"') { cur+='"'; i+=2; }
        else if (c==='"') { inQ=false; i++; }
        else { cur+=c; i++; }
      } else {
        if (c==='"') { inQ=true; i++; }
        else if (c===',') { cols.push(cur.trim()); cur=''; i++; }
        else { cur+=c; i++; }
      }
    }
    cols.push(cur.trim());
    return cols;
  };
  const allLines = lines.split('\n');

  // ヘッダー行を探す（PMXまたはCIDを含む行が本来のヘッダー）
  let headerIdx = 0;
  for (let i = 0; i < Math.min(5, allLines.length); i++) {
    if (allLines[i].includes('PMX') || allLines[i].includes('CID')) {
      headerIdx = i;
      break;
    }
  }

  const headers = parseRow(allLines[headerIdx]).map(h => h.replace(/^"|"$/g,'').trim());
  const rows = [];
  for (let i = headerIdx + 1; i < allLines.length; i++) {
    if (!allLines[i].trim()) continue;
    const cols = parseRow(allLines[i]);
    const row = {};
    headers.forEach((h,j) => row[h] = (cols[j]||'').replace(/^"|"$/g,'').trim());
    if (row['PMX']) rows.push(row);
  }
  return rows;
}

function checkReady() {
  document.getElementById('btnGen').disabled = !(rawData.z1 && rawData.z2);
}

// ── 生成 ─────────────────────────────────────────────────
function generate() {
  const EXCLUDE_CAT = [];
  let c1 = rawData.z1;
  let c2 = rawData.z2;

  const pmx1 = new Set(c1.map(r => String(parseInt(r['PMX']))));
  const pmx2 = new Set(c2.map(r => String(parseInt(r['PMX']))));
  commonPmx = new Set([...pmx1].filter(p => pmx2.has(p)));

  parsedData.c1 = [...c1].sort((a,b) => parseInt(a['PMX'])-parseInt(b['PMX']));
  parsedData.c2 = [...c2].sort((a,b) => parseInt(a['PMX'])-parseInt(b['PMX']));

  const dateLabel = deliveryDate || '日付不明';
  document.getElementById('previewTitle').textContent = `テレコ商品一覧　${dateLabel} 配達分`;

  const only1 = [...pmx1].filter(p => !pmx2.has(p)).length;
  const only2 = [...pmx2].filter(p => !pmx1.has(p)).length;

  const n1 = companyName.z1;
  const n2 = companyName.z2;

  document.getElementById('legend1').textContent = n1 + 'のみ';
  document.getElementById('legend2').textContent = n2 + 'のみ';

  document.getElementById('summary').innerHTML = `
    <div class="summary-card red"><div class="num">${commonPmx.size}</div><div class="lbl">テレコ被り商品</div></div>
    <div class="summary-card amber"><div class="num">${only1}</div><div class="lbl">${n1}のみ</div></div>
    <div class="summary-card blue"><div class="num">${only2}</div><div class="lbl">${n2}のみ</div></div>
  `;

  // 数量が異なるテレコ被り商品のPMXセット
  const map1 = Object.fromEntries(parsedData.c1.map(r => [String(parseInt(r['PMX'])), r]));
  const map2 = Object.fromEntries(parsedData.c2.map(r => [String(parseInt(r['PMX'])), r]));
  const diffPmx = new Set([...commonPmx].filter(pmx => {
    const q1 = safeInt(map1[pmx]?.['配達予定個数']) || 0;
    const q2 = safeInt(map2[pmx]?.['配達予定個数']) || 0;
    return q1 !== q2;
  }));

  document.getElementById('tables').innerHTML =
    buildOverlapTable(n1, n2, parsedData.c1, parsedData.c2) +
    `<div class="tables-row">` +
      buildTable(n1, parsedData.c1, 'c1', 'normal-c1', diffPmx) +
      buildTable(n2, parsedData.c2, 'c2', 'normal-c2', diffPmx) +
    `</div>`;

  document.getElementById('preview').classList.add('visible');
  document.getElementById('preview').scrollIntoView({ behavior:'smooth', block:'start' });
}

function buildOverlapTable(n1, n2, rows1, rows2) {
  if (commonPmx.size === 0) return '';

  const map1 = Object.fromEntries(rows1.map(r => [String(parseInt(r['PMX'])), r]));
  const map2 = Object.fromEntries(rows2.map(r => [String(parseInt(r['PMX'])), r]));

  const rowsHtml = [...commonPmx].sort((a,b)=>parseInt(a)-parseInt(b)).map(pmx => {
    const r1 = map1[pmx];
    const r2 = map2[pmx];
    const q1 = safeInt(r1?.['配達予定個数']) || 0;
    const q2 = safeInt(r2?.['配達予定個数']) || 0;
    const diff = q1 - q2;
    let diffHtml;
    if (diff === 0) {
      diffHtml = `<span class="qty-same">同数（${q1}個）</span>`;
    } else if (diff > 0) {
      diffHtml = `<span class="qty-diff more">${n1}が${Math.abs(diff)}個多い</span><br><span class="billing-note">→ ${n1}の${Math.abs(diff)}個分は請求差引</span>`;
    } else {
      diffHtml = `<span class="qty-diff more">${n2}が${Math.abs(diff)}個多い</span><br><span class="billing-note">→ ${n2}の${Math.abs(diff)}個分は請求差引</span>`;
    }
    return `<tr>
      <td class="left">${pmx}</td>
      <td class="left">${r1?.['商品カテゴリ']||''}</td>
      <td class="left">${r1?.['商品名']||''}</td>
      <td>${q1}個</td>
      <td>${q2}個</td>
      <td>${diffHtml}</td>
    </tr>`;
  }).join('');

  return `<div class="compare-wrap">
    <div class="compare-header">⚠️ テレコ被り商品　数量比較（${commonPmx.size}品）</div>
    <table class="compare-table">
      <thead><tr>
        <th class="left">PMX</th>
        <th class="left">カテゴリ</th>
        <th class="left">商品名</th>
        <th>${n1}<br>配達予定数</th>
        <th>${n2}<br>配達予定数</th>
        <th>差分</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  </div>`;
}

function buildTable(title, rows, colorClass, normalClass, diffPmx = new Set()) {
  const rowsHtml = rows.map(r => {
    const pmx = String(parseInt(r['PMX']));
    const isOverlap = commonPmx.has(pmx);
    const isBihin   = (r['商品カテゴリ']||'').trim() === '備品';
    const hasDiff   = diffPmx.has(pmx);
    const cls = isOverlap ? 'overlap' : isBihin ? 'bihin' : normalClass;
    const tag      = isBihin ? '' : isOverlap ? '<span class="tag-overlap">請求あり</span>' : '<span class="tag-seikyu">請求差引</span>';
    const diffTag  = (isOverlap && hasDiff) ? '<span class="tag-diff">差分あり</span>' : '';
    const bihinTag = isBihin ? '<span style="display:inline-block;font-size:10px;font-weight:700;background:#CE93D8;color:#4A148C;padding:1px 6px;border-radius:4px;margin-left:6px;vertical-align:middle;">備品</span>' : '';
    return `<tr class="${cls}">
      <td class="num">${pmx}</td>
      <td>${r['商品カテゴリ']||''}</td>
      <td>${r['商品名']||''}${tag}${diffTag}${bihinTag}</td>
      <td class="num">${r['商品価格']||''}</td>
      <td class="num">${r['従業員販売価格']||''}</td>
      <td class="num">${r['配達予定個数']||''}</td>
    </tr>`;
  }).join('');

  return `<div class="table-wrap">
    <div class="section-header ${colorClass}">${title}</div>
    <table>
      <thead><tr>
        <th class="num">PMX</th><th>カテゴリ</th><th>商品名</th>
        <th class="num">企業価格</th><th class="num">従業員購入価格</th><th class="num">配達予定数</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  </div>`;
}

// ── Excel（3シート構成） ──────────────────────────────
async function downloadExcel() {
  const btn = document.querySelector('.btn-download');
  btn.disabled = true;
  btn.innerHTML = '⏳ 生成中...';

  const dateLabel = deliveryDate || '日付不明';
  const fileDateStr = dateLabel.replace(/\//g, '');
  const n1 = companyName.z1;
  const n2 = companyName.z2;

  const wb = new ExcelJS.Workbook();

  const TB = {top:{style:'thin',color:{argb:'FFBDBDBD'}},bottom:{style:'thin',color:{argb:'FFBDBDBD'}},left:{style:'thin',color:{argb:'FFBDBDBD'}},right:{style:'thin',color:{argb:'FFBDBDBD'}}};

  function styl(cell, fill, bold, color, align, border) {
    cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:fill}};
    cell.font = {name:'Arial', size:10, bold:!!bold, color:{argb:color||'FF000000'}};
    cell.alignment = {horizontal:align||'center', vertical:'middle', wrapText:align==='left'};
    if (border) cell.border = TB;
  }

  function fullRow(ws, val, fill, bold, color, sz, h, cols) {
    const row = ws.addRow([val]); row.height = h||20;
    const last = cols||6;
    const lastLetter = String.fromCharCode(64+last);
    ws.mergeCells(`A${row.number}:${lastLetter}${row.number}`);
    const c = row.getCell(1);
    c.fill = {type:'pattern',pattern:'solid',fgColor:{argb:fill}};
    c.font = {name:'Arial', size:sz||10, bold:!!bold, color:{argb:color||'FF000000'}};
    c.alignment = {horizontal:'center', vertical:'middle'};
    return row;
  }

  function safeM(ws, range) { try { ws.mergeCells(range); } catch(e) {} }

  // ── diffPmx計算 ──
  const mx1 = Object.fromEntries(parsedData.c1.map(r=>[String(safeInt(r['PMX'])),r]));
  const mx2 = Object.fromEntries(parsedData.c2.map(r=>[String(safeInt(r['PMX'])),r]));
  const dPmx = new Set([...commonPmx].filter(p=>(safeInt(mx1[p]?.['配達予定個数'])||0)!==(safeInt(mx2[p]?.['配達予定個数'])||0)));

  // ════════════════════════════
  // シート1: テレコ比較
  // ════════════════════════════
  const ws1 = wb.addWorksheet('テレコ比較');
  ws1.columns = [{width:7},{width:16},{width:32},{width:14},{width:14},{width:20},{width:26}];

  fullRow(ws1, `テレコ商品一覧　${dateLabel} 配達分`, 'FF212121', true, 'FFFFFFFF', 13, 28, 7);
  fullRow(ws1, `■ 赤=テレコ被り（請求あり）　■ 黄=${n1}のみ（請求差引）　■ 青=${n2}のみ（請求差引）　■ 紫=備品`, 'FFF5F5F5', false, 'FF444444', 9, 18, 7);
  ws1.addRow([]).height = 6;

  if (commonPmx.size > 0) {
    fullRow(ws1, `⚠ テレコ被り商品　数量比較（${commonPmx.size}品）`, 'FFC62828', true, 'FFFFFFFF', 12, 24, 7);

    const ch = ws1.addRow(['PMX','カテゴリ','商品名',`${n1}\n配達予定数`,`${n2}\n配達予定数`,'差分','請求判定']);
    ch.height = 28;
    ch.eachCell((cell,cn) => { if(cn<=7) styl(cell,'FFFFF5F5',true,'FF555555','center',true); });

    [...commonPmx].sort((a,b)=>parseInt(a)-parseInt(b)).forEach(pmx=>{
      const r1=mx1[pmx], r2=mx2[pmx];
      const q1=safeInt(r1?.['配達予定個数'])||0, q2=safeInt(r2?.['配達予定個数'])||0;
      const diff=q1-q2;
      const dTxt = diff===0?'同数':diff>0?`${n1}が${Math.abs(diff)}個多い`:`${n2}が${Math.abs(diff)}個多い`;
      const bTxt = diff===0?'—':diff>0?`${n1}の${Math.abs(diff)}個分は請求差引`:`${n2}の${Math.abs(diff)}個分は請求差引`;
      const cr = ws1.addRow([parseInt(pmx), r1?.['商品カテゴリ']||'', r1?.['商品名']||'', q1, q2, dTxt, bTxt]);
      cr.height = 18;
      const red = diff!==0;
      cr.eachCell((cell,cn) => {
        styl(cell,'FFFFF8F8', red&&cn>=6, red&&cn>=6?'FFC62828':'FF1A1A2E', cn<=3||cn>=6?'left':'center', false);
      });
    });
  } else {
    fullRow(ws1, 'テレコ被り商品はありません', 'FFF5F5F5', false, 'FF888888', 10, 24, 7);
  }

  // ════════════════════════════
  // シート2: 1社目
  // ════════════════════════════
  function buildCompanySheet(ws, label, rows, secArgb, hdrArgb, normalArgb, normalFontArgb) {
    ws.columns = [{width:7},{width:16},{width:36},{width:9},{width:12},{width:11}];
    const COLS = 6;

    fullRow(ws, `テレコ商品一覧　${dateLabel} 配達分`, 'FF212121', true, 'FFFFFFFF', 13, 28, 6);
    fullRow(ws, `■ 赤=テレコ被り（請求あり）　■ 黄/青=正規商品（請求差引）　■ 紫=備品`, 'FFF5F5F5', false, 'FF444444', 9, 18, 6);
    ws.addRow([]).height = 6;

    fullRow(ws, label, secArgb, true, 'FFFFFFFF', 11, 24, 6);

    const hr = ws.addRow(['PMX','カテゴリ','商品名','企業価格','従業員購入価格','配達予定数']);
    hr.height = 22;
    hr.eachCell((cell,cn) => { if(cn<=COLS) styl(cell, hdrArgb, true, 'FFFFFFFF', 'center', true); });

    [...rows].sort((a,b)=>parseInt(a['PMX'])-parseInt(b['PMX'])).forEach(r => {
      const pmx = safeInt(r['PMX']); if(pmx==='') return;
      const ps = String(pmx);
      const isOv = commonPmx.has(ps), isBh = (r['商品カテゴリ']||'').trim()==='備品', haDf = dPmx.has(ps);
      const fill = isBh?'FFF3E5F5':isOv?'FFFF8A80':normalArgb;
      const fc   = isBh?'FF4A148C':isOv?'FF7F0000':normalFontArgb;
      const bold = isOv&&!isBh;
      let suf=''; if(!isBh&&isOv) suf+='【請求あり】'; if(isOv&&haDf) suf+='【差分あり】'; if(!isBh&&!isOv) suf+='【請求差引】';
      const dr = ws.addRow([pmx, r['商品カテゴリ']||'', (r['商品名']||'')+' '+suf, safeInt(r['商品価格']), safeInt(r['従業員販売価格']), safeInt(r['配達予定個数'])]);
      dr.height = 16;
      dr.eachCell((cell,cn) => { if(cn<=COLS) styl(cell, fill, bold, fc, cn===3?'left':'center', false); });
    });
  }

  buildCompanySheet(wb.addWorksheet(n1.slice(0,31)), n1, parsedData.c1, 'FFE65100','FFBF360C','FFFFF9C4','FF333300');
  buildCompanySheet(wb.addWorksheet(n2.slice(0,31)), n2, parsedData.c2, 'FF1A237E','FF283593','FFE3F2FD','FF0D2137');

  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`テレコ商品一覧_${fileDateStr}.xlsx`;
  a.click(); URL.revokeObjectURL(url);

  btn.disabled = false;
  btn.innerHTML = '📥 Excelをダウンロード';
}

</script>
